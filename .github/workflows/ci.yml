name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pytest

      - name: Run tests
        run: |
          pytest test_calculator.py -v

      - name: Build (demo)
        run: |
          echo "Building application..."
          python -c "import py_compile; py_compile.compile('calculator.py')"
          echo "Build successful!"
